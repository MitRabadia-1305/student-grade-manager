<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Manager</title>
    <link rel="stylesheet" href="project.css">
    <script src="project.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@500&family=Montserrat:wght@600&family=Nunito&family=Roboto&family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Student Grade Manager</h1>
        <h3>Enter student scores and generate reports</h3>
    </header>

    <section>
        <div class="upload">
            <h2>Student Information</h2>

            <form id="form">

                <div>
                    <label for="sID">Student ID:</label>
                    <input type="text" id="sID" name="sID">
                </div>

                <div>
                    <label for="sName">Student Name:</label>
                    <input type="text" id="sName" name="sName">
                </div>

                <div>
                    <label for="cName">Course Name:</label>
                    <input type="text" id="cName" name="cName">
                </div>

                <div>
                    <label for="ass">Assignment:</label>
                    <input type="text" id="ass" name="ass">
                </div>

                <div>
                    <label for="eScore">Exam Score:</label>
                    <input type="number" id="eScore" name="eScore">
                </div>

            </form>

            <div class="buttons">
                <button type="button" id="addBtn">Add Student</button>
                <button type="button" id="clearBtn">Clear Form</button>
            </div>

        </div> 
        
        <div class="statistics">
            <h2>Statistics</h2>

                <div>
                    <label for="total">Total Students:</label>
                    <input type="text" id="total" name="total" readonly>                
                </div>
                <div>
                    <label for="hAverage">Highest Score:</label>
                    <input type="number" id="hAverage" name="hAverage" readonly>
                </div>
                <div>
                    <label for="cAverage">Class Average:</label>
                    <input type="number" name="cAverage" id="cAverage" readonly>
                </div>
        </div>

    </section>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by student name...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student Name</th>
                    <th>Course</th>
                    <th>Score</th>
                    <th>Grade</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody id="tableBody">
                <tr id="placeholderROW">
                    <td colspan="6">No students added yet</td>
                </tr>
            </tbody>
        </table>

    </div>

    <div class="export-container">
        <button type="button" class="export-btn" id="exportBtn">
            Export Data — Generate JSON & PDF Report
        </button>
    </div>

    <footer>
        @2026 Student Grade Manager
    </footer>
</body>
</html>
